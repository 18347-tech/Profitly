<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LocalLedger</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <header class="header">
            <h1>📊 LocalLedger</h1>
            <p>Simple finance tracking for small businesses</p>
        </header>

        <!-- DASHBOARD -->
        <section class="dashboard">

            <div class="card income">
                <h3>💰 Income</h3>
                <p id="income">$0</p>
            </div>

            <div class="card expense">
                <h3>💸 Expenses</h3>
                <p id="expenses">$0</p>
            </div>

            <div class="card profit">
                <h3>📈 Profit</h3>
                <p id="profit">$0</p>
            </div>

            <div class="card total">
                <h3>🧾 Transactions</h3>
                <p id="totalTx">0</p>
            </div>

        </section>

        <!-- INPUT FORM -->
        <section class="card form-card">
            <h2>Add Transaction</h2>

            <input type="text" id="name" placeholder="Description" />

            <input type="number" id="amount" placeholder="Amount" />

            <input type="date" id="date" />

            <select id="category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Rent">Rent</option>
                <option value="Supplies">Supplies</option>
                <option value="Other">Other</option>
            </select>

            <select id="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <button onclick="addTransaction()">+ Add Transaction</button>
        </section>

        <!-- CONTROLS -->
        <section class="controls">

            <input type="text" id="search" placeholder="🔍 Search transactions..." oninput="renderTransactions()" />

            <div class="filters">
                <button onclick="setFilter('all')">All</button>
                <button onclick="setFilter('income')">Income</button>
                <button onclick="setFilter('expense')">Expense</button>
            </div>

        </section>

        <!-- CHART -->
        <section class="card">
            <h2>Overview</h2>
            <canvas id="chart"></canvas>
        </section>

        <!-- TRANSACTIONS -->
        <section class="card">
    <h2>Transactions</h2>

    <div id="emptyState" style="text-align:center; color:#64748b; padding:10px; display:none;">
        No transactions yet.  
        Add your first income or expense.
    </div>

    <div id="list"></div>
</section>

    </div>

    <script src="script.js"></script>

</body>
</html>
