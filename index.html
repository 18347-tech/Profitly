<!DOCTYPE html>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LocalLedger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>LocalLedger</h1>
        <p class="subtitle">Simple finance tracking for local businesses</p>

        <div class="card">
            <h2>Add Transaction</h2>

            <input type="text" id="name" placeholder="Description">
            <input type="number" id="amount" placeholder="Amount">
<select id="category">
  <option value="Food">Food</option>
  <option value="Transport">Transport</option>
  <option value="Rent">Rent</option>
  <option value="Supplies">Supplies</option>
  <option value="Other">Other</option>
</select>
            <select id="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <button onclick="addTransaction()">Add</button>
        </div>

        <div class="card summary">
            <h2>Summary</h2>
            <p>Income: $<span id="income">0</span></p>
            <p>Expenses: $<span id="expenses">0</span></p>
            <p><strong>Profit: $<span id="profit">0</span></strong></p>
        </div>

        <div class="card">
            <h2>Transactions</h2>
            <ul id="list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
<div class="card">
    <h2>Spending Overview</h2>
    <canvas id="chart"></canvas>
</div>
<p class="subtitle">Built to help local shops understand income, expenses, and profit in seconds.</p>
